name: Futures Options Analysis

on:
  # 定时触发 - 每天北京时间 08:00, 15:00, 21:00
  # UTC: 00:00, 07:00, 13:00
  schedule:
    - cron: '0 0,7,13 * * 1-5'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      symbols:
        description: '期货品种 (逗号分隔)'
        required: false
        default: 'CU,AU,AG'
        type: string

# 并发控制
concurrency:
  group: futures-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 随机延迟
        run: sleep $((RANDOM % 30))
      
      - name: 检出代码
        uses: actions/checkout@v5
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 创建输出目录
        run: mkdir -p output
      
      - name: 执行分析
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          echo "📊 期货品种: ${{ github.event.inputs.symbols || 'CU,AU,AG' }}"
          echo "PWD: $(pwd)"
          echo "Files: $(ls -la)"
          python main.py
      
      - name: 提交结果
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update analysis $(date +'%Y-%m-%d %H:%M')"
          git push || true
