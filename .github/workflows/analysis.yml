name: Futures Options Analysis

on:
  schedule:
    # 每天早上8点、下午3点、晚上9点运行（国内期货活跃时段）
    - cron: '0 0,7,14,20 * * *'
  workflow_dispatch:
    # 手动触发

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run analysis
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python main.py
      
      - name: Commit results
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update analysis results $(date +'%Y-%m-%d %H:%M')"
          git push
