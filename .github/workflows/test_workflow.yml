name: Test Data Fetch

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install akshare pandas --quiet

      - name: Run test
        run: python test_data.py 2>&1
